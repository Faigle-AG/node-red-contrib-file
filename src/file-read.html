<script type="text/javascript">
    RED.nodes.registerType('file-read', {
        category: 'storage',
        color: 'burlywood',
        defaults: {
            name: { value: '' },
            dynamic: { value: false },
            action: {
                value: 'read',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    return !!v && v.trim() !== '';
                },
            },
            source: {
                value: '',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    if (!v || v.trim() === '') return false;
                    var builtInValidator = RED.validators.typedInput('sourceType');
                    return builtInValidator.call(this, v);
                },
            },
            sourceType: { value: 'str' },
        },
        inputs: 1,
        outputs: 1,
        icon: 'file-in.svg',
        label: function () {
            return (
                this.name ||
                (!this.dynamic ? (this.action + ' ' + this.source).trim() : 'file-read')
            );
        },
        oneditprepare: function () {
            $('#node-input-source').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-sourceType'),
            });

            $('#node-input-dynamic').on('change', function () {
                if ($(this).prop('checked')) $('#file-options-group').hide();
                else $('#file-options-group').show();

                $('#node-input-source').trigger('change');
            });

            $('#node-input-dynamic').trigger('change');
        },
    });
</script>

<script type="text/markdown" data-help-name="file-read">
A node to read a file, check its existence, or retrieve its statistics.

### Properties

- **Load from msg.file** _boolean_ \
  If enabled, the node will ignore the UI properties and expect `msg.file.action` and `msg.file.path` to be provided dynamically.

- **Action** _dropdown_ \
  Select the operation to perform: Read, Check Exists, or Get Stat.

- **Source Path** _string | msg_ \
  The absolute path to the source file.

---

### Inputs

- **msg.file** _object_ \
  The incoming message triggers the operation.

- **msg.file.action** _string_ \
  The action to execute if triggered dynamically from msg.

- **msg.file.path** _string_ \
  The source file to run the action on.

### Outputs

- **msg.file** _object_ \
  The object containing the event details.

- **msg.file.filetype** _string_ \
  The type of item that triggered the event (`file`, `directory`).

- **msg.file.path** _string_ \
  The complete, normalized "absolute" path to the item.

- **msg.file.dir** _string_ \
  The "absolute" path to the parent directory containing the item.

- **msg.file.base** _string_ \
  The name of the file or directory _with_ the extension.

- **msg.file.name** _string_ \
  The name of the file or directory _without_ the extension.

- **msg.file.ext** _string_ \
  The file extension, including the dot.

- **msg.file.data** _string | buffer_ \
  The file content if the action was `Read`.

- **msg.file.exists** _boolean_ \
  The exists status of the file if the action was `Check Exists`.

- **msg.file.stats** _object_ \
  The Node.js `fs.Stats` object for the file (will be `null` if unavailable) if the action was `Get Stat`.
</script>
