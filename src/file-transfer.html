<script type="text/javascript">
    RED.nodes.registerType('file-transfer', {
        category: 'storage',
        color: 'burlywood',
        defaults: {
            name: { value: '' },
            dynamic: { value: false },
            action: {
                value: 'move',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    return !!v && v.trim() !== '';
                },
            },
            source: {
                value: '',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    if (!v || v.trim() === '') return false;

                    var builtInValidator = RED.validators.typedInput('sourceType');
                    return builtInValidator.call(this, v);
                },
            },
            sourceType: { value: 'str' },
            destination: {
                value: '',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    if (
                        ($('#node-input-action').length
                            ? $('#node-input-action').val()
                            : this.action) === 'delete'
                    )
                        return true;
                    if (!v || v.trim() === '') return false;

                    var builtInValidator = RED.validators.typedInput('destinationType');
                    return builtInValidator.call(this, v);
                },
            },
            destinationType: { value: 'str' },
            createDir: { value: true },
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-files-o',
        label: function () {
            return (
                this.name ||
                (!this.dynamic ? (this.action + ' ' + this.source).trim() : 'file-transfer')
            );
        },
        oneditprepare: function () {
            $('#node-input-source').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-sourceType'),
            });
            $('#node-input-destination').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-destinationType'),
            });

            $('#node-input-action').on('change', function () {
                var action = $(this).val();

                switch (action) {
                    case 'move':
                    case 'copy':
                        $('#row-source').show();
                        $('#row-destination').show();
                        $('#row-createDir').show();
                        break;
                    case 'delete':
                        $('#row-source').show();
                        $('#row-destination').hide();
                        $('#row-createDir').hide();
                        break;
                }
            });

            $('#node-input-dynamic').on('change', function () {
                if ($(this).prop('checked')) $('#file-options-group').hide();
                else $('#file-options-group').show();

                $('#node-input-action').trigger('change');
            });

            $('#node-input-dynamic').trigger('change');
        },
    });
</script>

<script type="text/markdown" data-help-name="file-transfer">
A node to move, rename, copy, or delete a file on the file system.

### Properties

- **Load from msg.file** _boolean_ \
  If enabled, the node will ignore the UI properties and expect `msg.file.action`, `msg.file.source`, and optionally `msg.file.destination` to be provided dynamically.

- **Action** _dropdown_ \
  Select the file operation to perform: Move / Rename, Copy, or Delete.

- **Source** _string | msg_ \
  The absolute path to the target file you want to transfer or delete.

- **Destination** _string | msg_ \
  The absolute path to the destination. Must include the target file name. _(Hidden if action is set to Delete)._

- **Create target directory** _boolean_ \
  If enabled, the node will automatically create the destination directory structure if it does not already exist. _(Hidden if action is set to Delete)._

---

### Inputs

- **msg.file** _object_ \
  The incoming message triggers the operation.

  - **msg.file.action** _string_ \
    The action to execute if triggered dynamically (`move`, `copy`, or `delete`).

  - **msg.file.source** _string_ \
    The original absolute path to the file.

  - **msg.file.destination** _string_ \
    The destination absolute path to the file (omitted for delete operations).

### Outputs

- **msg.file** _object_ \
  The object containing the event details.

  - **msg.file.filetype** _string_ \
    The type of item that triggered the event (`file`).

  - **msg.file.action** _string_ \
    The action performed (`move`, `copy`, or `delete`).

  - **msg.file.source** _string_ \
    The normalized absolute path of the original file.

  - **msg.file.destination** _string_ \
    The normalized absolute path of the destination (omitted for delete operations).

  - **msg.file.path** _string_ \
    The normalized absolute path to the resulting item (the destination if moved/copied, or the source if deleted).

  - **msg.file.dir** _string_ \
    The "absolute" path to the parent directory of the resulting item.

  - **msg.file.base** _string_ \
    The name of the resulting item _with_ the extension.

  - **msg.file.name** _string_ \
    The name of the resulting item _without_ the extension.

  - **msg.file.ext** _string_ \
    The file extension of the resulting item, including the dot.
</script>
