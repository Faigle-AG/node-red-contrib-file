<script type="text/javascript">
    RED.nodes.registerType('file-write', {
        category: 'storage',
        color: 'burlywood',
        defaults: {
            name: { value: '' },
            dynamic: { value: false },
            action: {
                value: 'write',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    return !!v && v.trim() !== '';
                },
            },
            target: {
                value: '',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    if (!v || v.trim() === '') return false;

                    var builtInValidator = RED.validators.typedInput('targetType');
                    return builtInValidator.call(this, v);
                },
            },
            targetType: { value: 'str' },
            data: {
                value: 'file.data',
                validate: function (v) {
                    if (
                        $('#node-input-dynamic').length
                            ? $('#node-input-dynamic').prop('checked')
                            : this.dynamic
                    )
                        return true;
                    if (!v || v.trim() === '') return false;

                    var builtInValidator = RED.validators.typedInput('dataType');
                    return builtInValidator.call(this, v);
                },
            },
            dataType: { value: 'msg' },
            createDir: { value: true },
        },
        inputs: 1,
        outputs: 1,
        icon: 'file-out.svg',
        label: function () {
            return (
                this.name ||
                (!this.dynamic ? (this.action + ' ' + this.source).trim() : 'file-write')
            );
        },
        oneditprepare: function () {
            $('#node-input-target').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-sourceType'),
            });

            $('#node-input-data').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-dataType'),
            });

            $('#node-input-dynamic').on('change', function () {
                if ($(this).prop('checked')) $('#file-options-group').hide();
                else $('#file-options-group').show();

                $('#node-input-target').trigger('change');
                $('#node-input-data').trigger('change');
            });

            $('#node-input-dynamic').trigger('change');
        },
    });
</script>

<script type="text/markdown" data-help-name="file-write">
A node to write or append data to a file on the file system.

### Properties

- **Load from msg.file** _boolean_ \
  If enabled, the node will ignore the UI properties and expect `msg.file.action`, `msg.file.path`, and `msg.file.data` to be provided dynamically.

- **Action** _dropdown_ \
  Select whether to write (overwrite) the file or append data to the end of it.

- **Target Path** _string | msg_ \
  The absolute path to the destination file.

- **Data** _string | msg_ \
  The content to be written or appended to the file.

- **Create target directory** _boolean_ \
  If enabled, the node will automatically create the target directory structure if it does not already exist.

---

### Inputs

- **msg.file** _object_ \
  The incoming message triggers the operation.

- **msg.file.action** _string_ \
  The action to execute if triggered dynamically (`write` or `append`).

- **msg.file.path** _string_ \
  The destination file path to write to.

- **msg.file.data** _string | buffer | object_ \
  The data to write. Objects will be automatically stringified.

### Outputs

- **msg.file** _object_ \
  The object containing the event details.

- **msg.file.filetype** _string_ \
  The type of item that triggered the event (`file`).

- **msg.file.path** _string_ \
  The complete, normalized "absolute" path to the item.

- **msg.file.dir** _string_ \
  The "absolute" path to the parent directory containing the item.

- **msg.file.base** _string_ \
  The name of the file _with_ the extension.

- **msg.file.name** _string_ \
  The name of the file _without_ the extension.

- **msg.file.ext** _string_ \
  The file extension, including the dot.
</script>
